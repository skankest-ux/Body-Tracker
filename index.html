<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d0b" />
  <title>Body Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header class="appHeader">
    <div>
      <h1>Body Tracker</h1>
      <div class="sub">RPG fitness character sheet</div>
    </div>
    <div class="badgeStack">
      <div class="level" id="levelBadge">LV --</div>
      <div class="versionBadge">v5.0.1</div>
    </div>
  </header>

  <main>
    <section id="todayScreen" class="screen active"></section>
    <section id="weekScreen" class="screen"></section>
    <section id="profileScreen" class="screen"></section>
    <section id="trendsScreen" class="screen"></section>
    <section id="settingsScreen" class="screen"></section>
  </main>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="today">Today</button>
  <button class="tab" data-tab="week">Week</button>
  <button class="tab" data-tab="profile">Profile</button>
  <button class="tab" data-tab="trends">Trends</button>
  <button class="tab" data-tab="settings">Settings</button>
</nav>
<div id="modal" class="modalBackdrop"></div>
<div id="toast" class="toast"></div>
<div class="versionFooter">v5.0.1</div>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}
</script>
</body>
</html>
