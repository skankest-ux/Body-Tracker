<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d0b" />
  <title>Body Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header>
    <div class="toprow">
      <div><h1>Body Tracker</h1><div class="sub">local-first RPG character progression</div></div>
      <div class="badgeStack"><div class="level" id="levelBadge">LV 1</div><div class="versionBadge" id="versionBadge">v4.0.0</div></div>
    </div>
  </header>

  <main>
    <section id="todayScreen" class="screen active"></section>
    <section id="weekScreen" class="screen"></section>
    <section id="trendsScreen" class="screen"></section>
    <section id="settingsScreen" class="screen"></section>
  </main>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="today">Today</button>
  <button class="tab" data-tab="week">Week</button>
  <button class="tab" data-tab="trends">Trends</button>
  <button class="tab" data-tab="settings">Settings</button>
</nav>
<div id="toast" class="toast"></div>
<div id="appVersionFooter" class="versionFooter">v4.0.0</div>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') { navigator.serviceWorker.register('./service-worker.js').catch(()=>{}); }
</script>
</body>
</html>
